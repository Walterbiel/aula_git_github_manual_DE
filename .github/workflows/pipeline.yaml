name: CI CD Aula

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validacao:
    name: 1 - Validacao
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Mostrar versao do Python
        run: python --version

      - name: Registrar resumo
        run: |
          echo "## Etapa 1 - Validacao concluida" >> $GITHUB_STEP_SUMMARY
          echo "- Checkout executado" >> $GITHUB_STEP_SUMMARY
          echo "- Python configurado" >> $GITHUB_STEP_SUMMARY

  teste:
    name: 2 - Teste
    runs-on: ubuntu-latest
    needs: validacao

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Criar evidencia de teste
        run: |
          mkdir -p evidencias
          echo "Teste executado com sucesso em $(date)" > evidencias/teste.txt
          cat evidencias/teste.txt

      - name: Registrar resumo
        run: |
          echo "## Etapa 2 - Teste concluido" >> $GITHUB_STEP_SUMMARY
          echo "- Arquivo evidencias/teste.txt criado" >> $GITHUB_STEP_SUMMARY

  artefato:
    name: 3 - Publicar artefato
    runs-on: ubuntu-latest
    needs: teste

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Criar arquivo final
        run: |
          mkdir -p evidencias
          echo "Build da aula finalizado em $(date)" > evidencias/build.txt

      - name: Upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-pipeline
          path: evidencias/

      - name: Registrar resumo
        run: |
          echo "## Etapa 3 - Artefato publicado" >> $GITHUB_STEP_SUMMARY
          echo "- Pasta evidencias enviada como artifact" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: 4 - Deploy simulador
    runs-on: ubuntu-latest
    needs: artefato
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Simular deploy
        run: |
          echo "Deploy executado somente depois do merge na main"
          echo "Ambiente atualizado em $(date)" > deploy.txt
          cat deploy.txt

      - name: Upload da evidencia de deploy
        uses: actions/upload-artifact@v4
        with:
          name: evidencia-deploy
          path: deploy.txt

      - name: Registrar resumo
        run: |
          echo "## Etapa 4 - Deploy concluido" >> $GITHUB_STEP_SUMMARY
          echo "- Esse job rodou apenas apos push na main" >> $GITHUB_STEP_SUMMARY
